<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/login.css">
    <title>Đăng nhập - B8 Game</title>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">🎮</div>
            <h1>Đăng nhập</h1>
            <p>Chào mừng trở lại!</p>
        </div>

        <form class="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email hoặc Tên đăng nhập</label>
                <input 
                    type="text" 
                    id="email" 
                    name="email" 
                    placeholder="Nhập email hoặc tên đăng nhập"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Nhập mật khẩu"
                    required
                >
            </div>

            <div class="options">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Ghi nhớ đăng nhập</label>
                </div>
                <a href="#" class="forgot-password">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn-login">Đăng nhập</button>

            <div class="register-link">
                Chưa có tài khoản? <a href="/client/pages/register-page/register.html">Đăng ký ngay</a>
            </div>

            <div class="back-home">
                <a href="/main.html">← Quay về trang chủ</a>
            </div>
        </form>
    </div>

    <script src="client/assets/js/login.js"></script>
</body>
</html>
