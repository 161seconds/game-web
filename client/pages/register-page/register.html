<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="client/assets/pages/register-page/register.css">
    <title>Đăng ký - B8 Game</title>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="register-icon">🎮</div>
            <h1>Đăng ký</h1>
            <p>Tạo tài khoản miễn phí!</p>
        </div>

        <form class="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="fullname">Họ và tên</label>
                <input 
                    type="text" 
                    id="fullname" 
                    name="fullname" 
                    placeholder="Nhập họ và tên"
                    required
                >
            </div>

            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Nhập tên đăng nhập"
                    required
                    minlength="4"
                >
                <div class="error-message" id="usernameError">Tên đăng nhập phải có ít nhất 4 ký tự</div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Nhập địa chỉ email"
                    required
                >
                <div class="error-message" id="emailError">Email không hợp lệ</div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Nhập mật khẩu"
                    required
                    minlength="6"
                    oninput="checkPasswordStrength()"
                >
                <div class="password-strength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
                <div class="password-strength-text" id="strengthText">Độ mạnh: Chưa nhập</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    placeholder="Nhập lại mật khẩu"
                    required
                    oninput="checkPasswordMatch()"
                >
                <div class="error-message" id="confirmError">Mật khẩu không khớp</div>
            </div>

            <div class="form-group">
                <label for="gender">Giới tính</label>
                <select id="gender" name="gender" required>
                    <option value="">Chọn giới tính</option>
                    <option value="male">Nam</option>
                    <option value="female">Nữ</option>
                    <option value="helicopter">Trực Thăng</option>
                    <option value="nicetryDiddy">nicetryDiddy</option>
                </select>
            </div>

            <button type="submit" class="btn-register" id="registerBtn">Đăng ký</button>

            <div class="login-link">
                Đã có tài khoản? <a href="/client/pages/login-page/login.html">Đăng nhập ngay</a>
            </div>

            <div class="back-home">
                <a href="/main.html">← Quay về trang chủ</a>
            </div>
        </form>
    </div>

    <script src="client/assets/js/register.js"></script>
</body>
</html>
